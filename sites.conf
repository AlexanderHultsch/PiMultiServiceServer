# Manifest aller Websites, die auf diesem Pi laufen sollen.
# Wird von scripts/deploy.sh gelesen. NUR auf dem env-Branch pflegen
# (verweist auf private Repos - gehoert nicht auf den generischen main-Branch).
#
# Format je Zeile (durch Leerzeichen getrennt):
#   name   repo_url   host   admin
#     name    = Ordnername unter apps/ UND Service-Name in docker-compose.yml
#     repo_url= Git-URL der Website (wird nach apps/<name>/ geklont/gepullt)
#     host    = Subdomain-Label (z.B. "winecashing" -> winecashing.<DOMAIN>),
#               oder "apex" fuer die Hauptdomain selbst
#     admin   = yes|no  (yes = braucht gemeinsamen Admin-Account + seed:admin)
#
# Zeilen mit # sind auskommentiert und werden ignoriert.
# WICHTIG: Neue Zeile hier genuegt NICHT allein - der Dienst muss auch in
# docker-compose.yml und config/caddy/Caddyfile stehen (siehe README).

# name          repo_url                                                host          admin
winecashing     https://github.com/AlexanderHultsch/WineCashing.git     winecashing   yes
ginperium       https://github.com/AlexanderHultsch/GinPerium.git       ginperium     no

# --- Noch zu verdrahten (Werte bitte pruefen, dann einkommentieren): ---
# projectindex  https://github.com/AlexanderHultsch/ProjectIndex.git    apex          no
# smarttank     https://github.com/AlexanderHultsch/SmartTank.git       smarttank     no
# airquality    https://github.com/AlexanderHultsch/AirQuality.git      airquality    no
