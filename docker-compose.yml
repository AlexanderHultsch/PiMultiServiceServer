services:
  pihole:
    image: pihole/pihole:2026.07.2
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      # Pi-hole v6: Passwort-Env-Name gegen docs.pi-hole.net/docker/configuration verifiziert
      FTLCONF_webserver_api_password: ${PIHOLE_PASSWORD}
      FTLCONF_dns_upstreams: "9.9.9.9;1.1.1.1"
      # Ohne dies default Pi-hole v6 auf dns.listeningMode=LOCAL: es vertraut dann nur
      # Anfragen aus dem eigenen Docker-Bridge-Subnetz und verwirft echte LAN-Clients
      # stillschweigend als "non-local" (sichtbar im Log als "ignoring query from
      # non-local network ..."). "ALL" ist hier sicher, weil Port 53 laut [M3]/[N4]
      # ohnehin nur an ${PI_STATIC_IP} gebunden ist, nicht an 0.0.0.0.
      FTLCONF_dns_listeningMode: "ALL"
    ports:
      - "${PI_STATIC_IP}:${PORT_DNS}:53/tcp"
      - "${PI_STATIC_IP}:${PORT_DNS}:53/udp"
      - "${PI_STATIC_IP}:${PORT_PIHOLE_UI}:80/tcp"
    volumes:
      - ./data/pihole/etc-pihole:/etc/pihole
    networks: [lan_net]

  # Reverse Proxy & Webserver fuer ALLE Websites (statisch + dynamisch).
  # cloudflared schickt jeden Hostnamen an caddy:80; Caddy verteilt anhand der
  # Subdomain (Routing in config/caddy/Caddyfile). Ersetzt den frueheren
  # nginx-"web"-Dienst.
  caddy:
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    environment:
      # Wird im Caddyfile als {$DOMAIN} eingesetzt (Textersetzung beim Einlesen).
      DOMAIN: ${DOMAIN}
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./sites:/srv:ro                 # statische Seiten (read-only)
      - ./data/caddy/data:/data         # Caddy-Laufzeitdaten
      - ./data/caddy/config:/config
    networks: [edge]
    # KEIN ports: (Constraint M8) - nur ueber cloudflared erreichbar

  # Beispiel fuer eine DYNAMISCHE App (eigener Container, eigenes Git-Repo).
  # Winzige Node-App ohne Abhaengigkeiten - spaeter durch die echte App ersetzen.
  # Caddy leitet app.${DOMAIN} hierher weiter (siehe Caddyfile).
  app-example:
    build: ./apps/app-example
    restart: unless-stopped
    networks: [edge]
    # KEIN ports: - nur intern ueber caddy erreichbar

  cloudflared:
    image: cloudflare/cloudflared:2026.7.0
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on: [caddy]
    networks: [edge]

  uptime-kuma:
    image: louislam/uptime-kuma:2.4.0
    restart: unless-stopped
    ports:
      - "${PI_STATIC_IP}:${PORT_UPTIME}:3001"
    volumes:
      - ./data/uptime-kuma:/app/data
    networks: [lan_net]

networks:
  edge:
  lan_net:
